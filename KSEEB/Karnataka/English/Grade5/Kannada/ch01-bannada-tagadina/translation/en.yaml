# ── ಸಾಮರ್ಥ್ಯ
competency: "After reading the text, to answer the questions — Who? When? Where? What? Why?"

# ── ಪ್ರವೇಶ
intro-1: "Joy, sorrow, pain — haven't these experiences happened to you too?"
intro-2: Recall one experience of your own.
intro-3: "There must be a reason for it, mustn't there?"
intro-4: Now observe the incident described here.
intro-5: Identify the situations that caused happiness and sadness.

# ── ಕವನ: ಬಣ್ಣದ ತಗಡಿನ ತುತ್ತೂರಿ
poem-s1l1: The colorful tin trumpet,
poem-s1l2: Kasturi bought it for a coin.
poem-s1l3: He blew Sa-Ri-Ga-Ma-Pa-Da-Ni-Sa (ascending notes).
poem-s1l4: He blew Sa-Ni-Da-Pa-Ma-Ga-Ri-Sa (descending notes).

poem-s2l1: "He boasted that only he has the trumpet,"
poem-s2l2: He said no one else has one.
poem-s2l3: "Kasturi strutted down the street,"
poem-s2l4: Like a proud, arrogant rooster.

poem-s3l1: "Blowing his trumpet near the pond,"
poem-s3l2: Kasturi walked in the evening.
poem-s3l3: The trumpet slipped into the water.
poem-s3l4: "His throat choked, tears welled in his eyes."

poem-s4l1: "He tried to blow Sa-Ri-Ga-Ma again,"
poem-s4l2: It only made a ga-ga-ga-ga gurgling sound.
poem-s4l3: "The paint washed off into the water,"
poem-s4l4: The colorful trumpet was stripped bare.

poem-s5l1: "The colorful trumpet was ruined,"
poem-s5l2: The arrogant rooster was left in grief.

