# ── ಅಭ್ಯಾಸ ಇ) passage
ex-c-p1: In Beeruru, a firewood merchant named Ramanna used to live.
ex-c-p2: He was very poor.
ex-c-p3: Every morning he would go to the forest, chop dry wood, and bring it back.
ex-c-p4: He would sell the firewood in the market and make his living.
ex-c-p5: He had never once cut a green / live tree.
ex-c-p6: "For this virtue, the forest goddess gave him the Akshaya Patre (the inexhaustible vessel)."
ex-c-p7: From this, Ramanna became wealthy.

ex-c-q1: Who is Ramanna?
ex-c-q2: Where did Ramanna live?
ex-c-q2-ans: Beeruru
ex-c-q3: When did Ramanna go to the forest?
ex-c-q3-ans: Every morning
ex-c-q4: Why did the forest goddess give Ramanna the Akshaya Patre?
ex-c-q4-ans: Because he never cut a green / live tree.
