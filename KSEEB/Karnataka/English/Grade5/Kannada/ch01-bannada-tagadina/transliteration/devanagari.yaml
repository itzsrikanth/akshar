# ── ಸಾಮರ್ಥ್ಯ
competency: पठ्यवन्नु ओदिद मेले यारु? यावाग? एल्लि? एनु? एके? एंब प्रश्नेगळिगे उत्तरिसुवुदु.

# ── ಪ್ರವೇಶ
intro-1: सन्तोष, दुःख, नोवु — ई अनुभवगळु निनगू आगिरबहुदल्लवे?
intro-2: निन्न ओन्दु अनुभववन्नु नेनेपिसिको.
intro-3: अदक्के ओन्दु कारणवू इरबेकल्लवे?
intro-4: ईग इल्लिन घटनेयन्नु गमनिसु.
intro-5: सन्तोष हागू दुःखक्के कारणवाद सन्दर्भगळन्नु गुरुतिसु.

# ── ಕವನ: ಬಣ್ಣದ ತಗಡಿನ ತುತ್ತೂರಿ
poem-s1l1: बण्णद तगडिन तुत्तूरि
poem-s1l2: कासिगे कोण्डनु कस्तूरि
poem-s1l3: सरिगमपदनिस ऊदिदनु
poem-s1l4: सनिदप मगरिस ऊदिदनु

poem-s2l1: तनगे तुत्तूरि इदेयेन्द
poem-s2l2: बेरारिगू अदु इल्लेन्द
poem-s2l3: कस्तूरि नडेदनु बीदियलि
poem-s2l4: जंभद कोळिय रीतियलि

poem-s3l1: तुत्तूरियूदुत कोळद बळि
poem-s3l2: नडेदनु कस्तूरि संजेयलि
poem-s3l3: जारितु नीरिगे तुत्तूरि
poem-s3l4: गंटलु कट्टितु नीरूरि

poem-s4l1: सरिगम ऊदलु नोडिदनु
poem-s4l2: ग-ग-ग-ग सद्दनु माडिदनु
poem-s4l3: बण्णवु नीरिन पालायतु
poem-s4l4: बण्णद तुत्तूरि बोळायतु

poem-s5l1: बण्णद तुत्तूरि हाळायतु
poem-s5l2: जंभद कोळिगे गोळायतु

