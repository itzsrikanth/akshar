# ── ಅಭ್ಯಾಸ ಇ) passage
ex-c-p1: बीरूरिनल्लि रामण्ण एंब कट्टिगे व्यापारियु वासिसुत्तिद्दनु.
ex-c-p2: अवनु तुंबा बडवनागिद्दनु.
ex-c-p3: अवनु प्रति दिन बेळग्गे कादिगे होगि ओण मरवन्नु कडिदु तरुत्तिद्दनु.
ex-c-p4: पेटेयल्लि कट्टिगे मारि जीवन नडेसुत्तिद्दनु.
ex-c-p5: अवनु एन्दू हसि मरवन्नु कडिदवनल्ल.
ex-c-p6: इदक्कागि इवनिगे वनदेवतेयु अक्षय पात्रेयन्नु नीडिदळु.
ex-c-p7: इदरिंद रामण्ण श्रीमंतनादनु.

ex-c-q1: रामण्ण यारु?
ex-c-q2: रामण्ण एल्लि वासिसुत्तिद्दनु?
ex-c-q2-ans: बीरूरु
ex-c-q3: रामण्ण यावाग कादिगे होगुत्तिद्दनु?
ex-c-q3-ans: प्रतिदिन बेळग्गे
ex-c-q4: वनदेवतेयु रामण्णनिगे अक्षय पात्रेयन्नु एके नीडिदळु?
ex-c-q4-ans: अवनु एन्दू हसि मरवन्नु कडिदवनल्ल.
