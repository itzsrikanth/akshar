# ── ಅಭ್ಯಾಸ ಆ)
ex-b-q1: बण्णद तगडिन ________
ex-b-q1-ans: तुत्तूरि
ex-b-q2: कस्तूरि नडेदनु ________
ex-b-q2-ans: बीदियलि
ex-b-q3: ________ नीरिगे तुत्तूरि
ex-b-q3-ans: जारितु
