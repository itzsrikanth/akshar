segments:

  # ── ಸಾಮರ್ಥ್ಯ (Competency) ──────────────────────────────
  - id: competency
    type: competency
    text: ಸರಿಯಾದ ಉಚ್ಚಾರದೊಂದಿಗೆ ಮಾತನಾಡುವುದು. ಸರಿಯಾದ ಸ್ವರಭಾರ ಮತ್ತು ಅಭಿನಯದ ಮೂಲಕ ಗೊತ್ತಿರುವ ಸರಳ ಕಥೆಗಳನ್ನು ಹೇಳುವುದು.

  # ── ಪ್ರವೇಶ (Introduction) ──────────────────────────────
  - id: intro-1
    type: prose
    section: intro
    text: ನಾವು ಕನಸನ್ನು ಕಾಣುತ್ತೇವೆ ಅಲ್ಲವೇ?

  - id: intro-2
    type: prose
    section: intro
    text: ಹಾಗಿದ್ದರೆ ನೀನು ಕಂಡ ಕನಸೊಂದನ್ನು ನೆನಪು ಮಾಡಿಕೊ.

  - id: intro-3
    type: prose
    section: intro
    text: ಇಲ್ಲಿ ವಿದ್ಯಾರ್ಥಿಯೊಬ್ಬ ಕಂಡ ಕನಸಿದೆ.

  - id: intro-4
    type: prose
    section: intro
    text: ಅದು ಏನಿರಬಹುದು ಎಂಬ ಕುತೂಹಲವೇ?

  - id: intro-5
    type: prose
    section: intro
    text: ಹಾಗಿದ್ದರೆ ಅದನ್ನು ತಿಳಿದು ಗೆಳೆಯರೊಂದಿಗೆ ಹಂಚಿಕೊ.

  # ── ಕಥೆ (Story) ──────────────────────────────────────
  - id: story-n1
    type: prose
    section: story
    text: ಒಂದು ದಟ್ಟವಾದ ಕಾಡು. ವಿಶಾಲ ಪ್ರದೇಶದಲ್ಲಿ ಬೆಳೆದಿರುವ ಎತ್ತರವಾದ ಮರ ಗಿಡಗಳು, ಮರಗಳನ್ನು ಬಳಸಿ ಮುಗಿಲೆತ್ತರಕ್ಕೆ ಹಬ್ಬುತ್ತಿರುವ ಬಳ್ಳಿಗಳು, ಹಸಿರಿನ ನಡುವೆ ಬಣ್ಣದ ಚಿತ್ತಾರ ಮೂಡಿಸಿರುವ ಹೂ, ಹಣ್ಣುಗಳು, ದುಂಬಿಯ ಝೇಂಕಾರ, ಪಕ್ಷಿಗಳ ಕಲರವ, ನಡುವೆ ತೇಲಿ ಬರುತ್ತಿರುವ ಕೋಗಿಲೆಯ ಧ್ವನಿ, ಜುಳು ಜುಳು ಹರಿಯುತ್ತಿರುವ ಝರಿಯ ನಿನಾದ. ಇಂತಹ ಸುಂದರ ಪರಿಸರವು ಪ್ರಾಣಿ ಪಕ್ಷಿಗಳಿಗೆ ನೆಮ್ಮದಿಯ ಆಶ್ರಯ ತಾಣವಾಗಿತ್ತು.

  - id: story-n2
    type: prose
    section: story
    text: ಒಂದು ಮುಂಜಾನೆ. ಕಾಡಿನ ಕಲರವದ ನಡುವೆ ಹೆಜ್ಜೆಯ ಸಪ್ಪಳವು ಪ್ರಾಣಿಗಳ ಕಿವಿಯನ್ನು ನಿಮಿರುವಂತೆ ಮಾಡಿತು. ಏನೆಂದು ನೋಡುವಷ್ಟರಲ್ಲಿ ಮರದ ಬುಡಕ್ಕೆ ಬಿದ್ದ ಹೊಡೆತದಿಂದ ಪಕ್ಷಿಗಳು ಚೀರುತ್ತಾ ಹಾರಿದವು. ಸನಿಹದಲ್ಲಿದ್ದ ಪ್ರಾಣಿಗಳು ಭಯಮಿಶ್ರಿತ ಕುತೂಹಲದಿಂದ "ಯಾರದು?" ಎಂದು ತಿರುಗಿ ನೋಡಿದವು. ಮಾನವನನ್ನು ಕಂಡು ಸಿಟ್ಟುಗೊಂಡು ವಾದಕ್ಕೆ ಮುಂದಾದವು.

  - id: story-d1
    type: dialogue
    section: story
    speaker: ಮೊಲ
    text: ಏ ಮಾನವ. ನಿನಗಿನ್ನೂ ಬುದ್ದಿ ಬರಲಿಲ್ಲವೇ? ಅತಿವೃಷ್ಟಿ ಹಾಗೂ ಅನಾವೃಷ್ಟಿ ಯಿಂದ ಸಾವು ನೋವುಗಳೂ ಸಂಭವಿಸಿವೆ. ಆದರೂ ಕಾಡಿನ ನಾಶಕ್ಕೆ ಮುಂದಾಗಿರುವೆಯಲ್ಲಾ, ಛೀ ಅವಿವೇಕಿ!

  - id: story-d2
    type: dialogue
    section: story
    speaker: ಮಾನವ
    text: ಅಂಜುಬುರುಕ ಪ್ರಾಣಿಯೇ! ನೀನು ಮಾನವನನ್ನು ಅವಿವೇಕಿ ಎನ್ನುವೆಯಾ? ನಮ್ಮ ಬುದ್ದಿವಂತಿಕೆ ನಿನಗೇನು ಗೊತ್ತು? (ಕೊಡಲಿಯನ್ನು ಹೆಗಲ ಮೇಲಿಟ್ಟು ಗತ್ತಿನಿಂದ ಹೇಳಿದನು)

  - id: story-d3
    type: dialogue
    section: story
    speaker: ಜಿಂಕೆ
    text: ಹೇಳಪ್ಪ ನಿಮ್ಮ ಜಾಣತನವನ್ನು... ನಾವೂ ಸ್ವಲ್ಪ ತಿಳಿಯುತ್ತೇವೆ.

  - id: story-d4
    type: dialogue
    section: story
    speaker: ಮಾನವ
    text: ಆಕಾಶದಲ್ಲಿ ಹಾರುವ ವಿಮಾನ, ನೀರಿನ ಮೇಲೆ ಚಲಿಸುವ ದೋಣಿ, ಹಡಗುಗಳನ್ನು ಸೃಷ್ಟಿಸಿದ್ದೇವೆ. ಇದಿಷ್ಟು ಸಾಕಲ್ಲವೇ ನಮ್ಮ ಬುದ್ಧಿವಂತಿಕೆಗೆ?

  - id: story-d5
    type: dialogue
    section: story
    speaker: ನರಿ
    text: (ಕತ್ತನ್ನು ಮೇಲೆತ್ತಿ ಮೂದಲಿಸುತ್ತಾ) ಪಕ್ಷಿಯನ್ನು ನೋಡಿ ವಿಮಾನವನ್ನು, ಜಲಚರಗಳನ್ನು ನೋಡಿ ದೋಣಿ, ಹಡಗುಗಳನ್ನು ನಿರ್ಮಿಸಿರುವೆ. ಇದರಲ್ಲಿ ನಿಮ್ಮ ಸ್ವಂತಿಕೆ ಏನು?

  - id: story-d6
    type: dialogue
    section: story
    speaker: ಮಾನವ
    text: (ನರಿಯ ಮಾತಿಗೆ ಮಂಕಾದ ಮಾನವ, ತೋರ್ಪಡಿಸಿಕೊಳ್ಳದೆ) ಸುಂದರವಾಗಿ ಕಾಣಲು ಉಡುಗೆ ತೊಡುಗೆಗಳನ್ನು ಸೃಷ್ಟಿಸಿದ್ದೇವೆ. ನಿಮಗಿದು ತಿಳಿಯದೇ?

  - id: story-d7
    type: dialogue
    section: story
    speaker: ಜಿಂಕೆ
    text: ಮೊದಲಿಗೆ ನಮ್ಮ ಚರ್ಮವನ್ನೇ ಧರಿಸುತ್ತಿದ್ದುದನ್ನು ನೆನಪಿಸಿಕೋ. ನಿಮ್ಮ ಬಟ್ಟೆಯಲ್ಲೇನು ವಿಶೇಷ? ಪ್ರಾಣಿ, ಪಕ್ಷಿ, ಕೀಟಗಳ ಮೈಬಣ್ಣಕ್ಕೆ ಮನಸೋತು ನಮ್ಮಂತೆ ಸುಂದರವಾಗಿ ಕಾಣಲು ಬಟ್ಟೆಗಳನ್ನು ಸಿದ್ಧಪಡಿಸಿರುವೆ. ಸಹಜ ಸೌಂದರ್ಯ ನಮ್ಮದು, ತಿಳಿಯಿತೇ?

  - id: story-d8
    type: dialogue
    section: story
    speaker: ಕೋತಿ
    text: (ಕೊಂಬೆಯನ್ನು ಹಿಡಿದು ಜೋತಾಡುತ್ತ) ಜಿಂಕೆಯ ಕಣ್ಣಿನಂತಹ ಕಣ್ಣು, ನವಿಲಿನ ನಡಿಗೆಯಂತಹ ನಡಿಗೆ, ಕೋಗಿಲೆಯ ದನಿಯಂತಹ ದನಿ ಇರಬೇಕು ಎಂದೆಲ್ಲ ಹೇಳುವ ನೀವು ಸುಂದರವೋ ಅಥವಾ ನಾವು ಸುಂದರವೋ?

  - id: story-d9
    type: dialogue
    section: story
    speaker: ಕಾಡು ಹಂದಿ
    text: (ಗುಟುರು ಹಾಕುತ್ತಾ) ಅಗತ್ಯ ವಸ್ತುಗಳನ್ನು ಉತ್ಪಾದಿಸುವ ನಿಮ್ಮ ಕಾರ್ಖಾನೆಗಳು ಹೊಗೆ ಮತ್ತು ಕಲ್ಮಶವನ್ನು ಹೊರ ಹಾಕುತ್ತವೆ. ಇದರಿಂದ ಗಾಳಿ, ಮಣ್ಣು, ನೀರು ಮಲಿನವಾಗುತ್ತವೆ. ಇದೇಕೆ ನಿನಗೆ ತಿಳಿಯುತ್ತಿಲ್ಲ?

  - id: story-d10
    type: dialogue
    section: story
    speaker: ಮಾನವ
    text: (ಪ್ರಾಣಿಗಳ ಒಗ್ಗಟ್ಟು ಮತ್ತು ಬುದ್ದಿವಂತಿಕೆಯನ್ನು ಕಂಡ ಮಾನವನಿಗೆ ತಾನು ಸೋಲುತ್ತಿರುವುದು ಮನವರಿಕೆಯಾಯಿತು. ಆದರೂ ತೋರ್ಪಡಿಸಿಕೊಳ್ಳದೆ) ಬಯಲಿನಲ್ಲಿ ವಾಸ ಮಾಡುವ ನಿಮಗೇನು ಗೊತ್ತು ನಾವು ಕಟ್ಟಿರುವ ಸುಂದರವಾದ ಮನೆಗಳ ಬಗ್ಗೆ ಬಂದು ನೋಡಿ. ನಮ್ಮ ಬುದ್ಧಿವಂತಿಕೆ ತಿಳಿಯುತ್ತದೆ.

  # speaker unknown — marked <missing> in the source; left unset rather than guessed
  - id: story-d11
    type: dialogue
    section: story
    text: ಗೀಜಗನ ಗೂಡು, ಜೇನುಗೂಡು, ಗೆದ್ದಲುಹುಳು ಕಟ್ಟುವ ಹುತ್ತಗಳು ಎಷ್ಟು ಸುಂದರ, ಸುರಕ್ಷಿತ! ಕಸದಿಂದ ಮಾಡಿರುವ ನಮ್ಮ ಸಾಧನೆಯ ಮುಂದೆ ಪ್ರಕೃತಿಯ ನಾಶದ ನಿಮ್ಮ ಸಾಧನೆ ಶೂನ್ಯ. (ಪ್ರಾಣಿ ಪಕ್ಷಿಗಳ ಬುದ್ದಿವಂತಿಕೆಗೆ ಮಾನವ ಬೆರಗಾದ)

  - id: story-d12
    type: dialogue
    section: story
    speaker: ಮಾನವ
    text: (ಆಶ್ಚರ್ಯದಿಂದ) ನಿಮಗೆ ಇದೆಲ್ಲ ಹೇಗೆ ತಿಳಿಯಿತು?

  - id: story-d13
    type: dialogue
    section: story
    speaker: ಕೊಕ್ಕರೆ
    text: (ಬಳುಕುತ್ತಾ) ನಮ್ಮಲ್ಲಿ ಕೆಲವರು ವರ್ಷದಲ್ಲಿ ಕೆಲವು ತಿಂಗಳು ದೇಶ ವಿದೇಶಗಳಿಗೆ ವಲಸೆ ಹೋಗುತ್ತೇವೆ. ಅಲ್ಲಿ ಗೆಳೆಯರೊಂದಿಗೆ ಚರ್ಚಿಸುತ್ತೇವೆ. ನಿನಗಿದು ತಿಳಿಯದೇ?

  # speaker inferred from the stage direction itself ("ಆಲಿಸುತ್ತಿದ್ದ ಮರವು" — the tree that had been listening)
  - id: story-d14
    type: dialogue
    section: story
    speaker: ಮರ
    text: (ಸಹನೆಯಿಂದ ಆಲಿಸುತ್ತಿದ್ದ ಮರವು) ಏ ಮಾನವ, ನೀನು ಏನೇ ಮಾಡಿದ್ದರೂ ಅಥವಾ ಮುಂದೆ ಮಾಡಿದರೂ ಅದು ಈ ಪ್ರಕೃತಿಯ ಪ್ರಭಾವದಿಂದ, ಪ್ರಕೃತಿಯ ಅಂಗವಾದ ಕಾಡಿನ ನಾಶದಿಂದ ನಿನ್ನ ಸಂತತಿಯ ನಾಶವೆಂಬುದನ್ನು ಮೊದಲು ಅರಿತುಕೋ. ಕಾಡಿನ ಸಂರಕ್ಷಣೆಗೆ ಮುಂದಾಗು, ಸಾಲುಮರದ ತಿಮ್ಮಕ್ಕನನ್ನು ನೋಡಿ ಕಲಿ. ನೀನು ಬದುಕುವ ಜೊತೆಗೆ ಪ್ರಕೃತಿಯ ಉಳಿವಿಗೆ ನಿನ್ನ ಬುದ್ದಿವಂತಿಕೆಯನ್ನು ತೋರಿಸು. ಏಳು ಎಚ್ಚರಗೊಳ್ಳು, ಸಮಯ ಮೀರುವ ಮುನ್ನ ಎದ್ದೇಳು.

  - id: story-d15
    type: dialogue
    section: story
    speaker: ಅಮ್ಮ
    text: ರಾಜು, ಏಳೋ, ಶಾಲೆಗೆ ತಡವಾಗುತ್ತೆ. (ಏಳು, ಎದ್ದೇಳು ಎಂಬ ಕೂಗಿಗೆ ರಾಜು ಎಚ್ಚರಗೊಂಡ, ಹಾಸಿಗೆಯ ಮೇಲೆ ಕುಳಿತ)

  # speaker corrected from "ಕಾಡು" (forest) in the source, which doesn't fit — this is the boy
  # Amma just addressed as ರಾಜು, and it's his own dream being recounted
  - id: story-d16
    type: dialogue
    section: story
    speaker: ರಾಜು
    text: ಅಮ್ಮ. ಅಮ್ಮಾ. ನನಗೆ ಕನಸು ಬಿದ್ದಿತ್ತು. ಎಂಥಾ ಕನಸು ಗೊತ್ತಾ? ಕಾಡಿನಲ್ಲಿ ಪ್ರಾಣಿಗಳೆಲ್ಲ ಸೇರಿ ಮರ ಕಡಿಯಲು ಹೋದ ಮನುಷ್ಯನ ಮನಃಪರಿವರ್ತನೆ ಮಾಡಿದವು. ಅಲ್ಲಿ ಎಷ್ಟೆಲ್ಲ ಪ್ರಾಣಿಗಳಿದ್ದವು ಗೊತ್ತಾ?

  - id: story-d17
    type: dialogue
    section: story
    speaker: ಅಮ್ಮ
    text: ಹೌದಾ, ನಿಜವಾಗಿಯೂ ಇದು ಒಳ್ಳೆಯ ಕನಸೇ! ರಾಜು, ನಿನ್ನೆ ರಾತ್ರಿ 'ಕಾಡಿನ ಕಥೆ' ಓದಿ ಮಲಗಿದೆಯಲ್ಲಾ, ಅದಕ್ಕೇ ಈ ರೀತಿ ಕನಸು ಬಿದ್ದಿದೆ. ನಾವು ಪ್ರಾಣಿಗಳಿಂದ ಕಲಿಯೋದು ಬಹಳಷ್ಟಿದೆ. ನೋಡು, ಆ ಕೋಳಿ ಕೂಗಿ ಎಲ್ಲರನ್ನೂ ಎಚ್ಚರಿಸುತ್ತಿದೆ. ಏಳು ಬೇಗ.

