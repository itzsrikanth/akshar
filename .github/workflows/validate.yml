name: Validate content

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate schema, structure, and encoding
        run: python3 scripts/validate.py

      - name: Check generated chapter READMEs are up to date
        run: python3 scripts/generate_readme.py --check
